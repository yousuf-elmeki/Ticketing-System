{% extends "layout.html" %}

{% block content %}
<h2>Tickets</h2>

{% for ticket in tickets %}
<div style="border:1px solid black; padding:10px; margin:10px;">
    <h3>{{ ticket.title }}</h3>
    <p>{{ ticket.description }}</p>

    <p>User: {{ ticket.full_name }}</p>
    <p>Status: {{ ticket.status_label }}</p>
    <p>Priority: {{ ticket.priority_level }}</p>

    <a href="/update/{{ ticket.ticket_id }}">Update</a> |
    <a href="/delete/{{ ticket.ticket_id }}">Delete</a>
</div>
{% endfor %}

{% endblock %}

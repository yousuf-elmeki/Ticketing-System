{% extends "layout.html" %}

{% block content %}
<h1>Tickets</h1>

{% for ticket in tickets %}
    <div style="border:1px solid black; margin:10px; padding:10px;">
        <h3>{{ ticket.title }}</h3>
        <p>{{ ticket.description }}</p>
        <p><strong>User:</strong> {{ ticket.full_name }}</p>
        <p><strong>Status:</strong> {{ ticket.status_label }}</p>
        <p><strong>Priority:</strong> {{ ticket.priority_level }}</p>
    </div>
{% endfor %}

{% endblock %}

{% extends "layout.html" %}

{% block content %}
<h2>Update Ticket</h2>

<form method="POST">

<select name="status">
{% for s in statuses %}
<option value="{{ s.status_id }}">{{ s.status_label }}</option>
{% endfor %}
</select>

<select name="priority">
{% for p in priorities %}
<option value="{{ p.priority_id }}">{{ p.priority_level }}</option>
{% endfor %}
</select>

<br><br>
<button>Update</button>

</form>

{% endblock %}
